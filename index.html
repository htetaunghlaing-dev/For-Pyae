<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Pyae ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #ff4d6d;
            font-size: 26px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .gif {
            width: 150px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            min-height: 60px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease-out;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            z-index: 999; /* Keeps Yes button on top of everything */
        }
        #noBtn {
            background-color: #7b2cbf;
            color: white;
        }
        .success-message {
            display: none;
        }
        .success-message h1 {
            color: #d90429;
        }
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 24px;
            animation: floatUp 3s linear infinite;
            z-index: 1;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- Cute question gif -->
        <img class="gif" src="https://giphy.com" alt="Cute Bear">
        <h1 id="question">Do you love me, Pyae? 🥺👉👈</h1>
        <div class="buttons" id="btnGroup">
            <button id="yesBtn" onclick="sayYes()">Yes!</button>
            <button id="noBtn" onmouseover="makeYesBigger()" onclick="makeYesBigger()">No</button>
        </div>
    </div>

    <div class="container success-message" id="successContainer">
        <!-- Cute happy gif -->
        <img class="gif" src="https://giphy.com" alt="Happy Bear">
        <h1>I love u tooo pyae! ❤️🥰✨</h1>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('question');
        const mainContainer = document.getElementById('mainContainer');
        const successContainer = document.getElementById('successContainer');

        let clickCount = 0;
        let yesSize = 18; // starting font size in px
        let noSize = 18;  // starting font size in px

        const phrases = [
            "Are you sure? 🥺",
            "Please click Yes? 😭",
            "Think again! 💔",
            "You have no choice now! 😂",
            "Just say YES! 💖"
        ];

        function makeYesBigger() {
            clickCount++;
            
            // Make Yes bigger and No smaller
            yesSize += 25; // Grows aggressively 
            noSize = Math.max(5, noSize - 3); // Shrinks 

            yesBtn.style.fontSize = yesSize + 'px';
            yesBtn.style.padding = (yesSize / 1.5) + 'px ' + (yesSize * 1.5) + 'px';
            
            noBtn.style.fontSize = noSize + 'px';
            noBtn.style.padding = (noSize / 1.5) + 'px ' + (noSize * 1.5) + 'px';

            // Change question text to tease her
            if (clickCount <= phrases.length) {
                questionText.innerHTML = phrases[clickCount - 1];
            }

            // Move the No button slightly so it acts crazy
            const x = (Math.random() - 0.5) * 40;
            const y = (Math.random() - 0.5) * 40;
            noBtn.style.transform = `translate(${x}px, ${y}px)`;

            // Fully cover the No button after a few tries
            if (clickCount >= 5) {
                yesBtn.style.position = 'fixed';
                yesBtn.style.top = '0';
                yesBtn.style.left = '0';
                yesBtn.style.width = '100vw';
                yesBtn.style.height = '100vh';
                yesBtn.style.borderRadius = '0';
                yesBtn.style.fontSize = '50px';
                yesBtn.innerHTML = "YES! ❤️";
                noBtn.style.display = 'none';
            }
        }

        function sayYes() {
            mainContainer.style.display = 'none';
            successContainer.style.display = 'block';
            createHearts();
        }

        function createHearts() {
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 3000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
